name: .NET build and test

on:
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build and test
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore WorldSimulator.sln

      - name: Build
        run: dotnet build WorldSimulator.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test WorldSimulator.sln --configuration Release --no-build --verbosity normal
